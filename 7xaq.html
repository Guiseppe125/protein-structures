<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>7XAQ – Mol* Viewer</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
    }
    #viewer {
      width: 100vw;
      height: 100vh;
    }
  </style>

  <script src="https://unpkg.com/molstar/build/viewer/molstar.js"></script>
</head>

<body>
  <div id="viewer"></div>

  <script>
    async function init() {
      const viewer = new molstar.Viewer('viewer', {
        layoutIsExpanded: false,
        layoutShowControls: false,
        layoutShowRemoteState: false,
        layoutShowSequence: false,
        layoutShowLog: false,
        layoutShowLeftPanel: false,
        viewportShowExpand: false,
        viewportShowSelectionMode: false,
        viewportShowAnimation: false,
        showControls: false,
        showSettings: false
      });

      // 1. Descargar el archivo PDB como texto
      const response = await fetch('structures/7xaqmAF.pdb');
      const pdbText = await response.text();

      // 2. Convertir el texto a Blob
      const pdbBlob = new Blob([pdbText], { type: 'text/plain' });

      // 3. Cargarlo en Mol*
      const data = await viewer.plugin.builders.data.rawData({
        data: pdbBlob,
        label: '7XAQ'
      });

      const trajectory = await viewer.plugin.builders.structure.parseTrajectory(data, 'pdb');

      // 4. Representación cartoon
      await viewer.plugin.builders.structure.representation.applyPreset(trajectory, 'default');
    }

    init();
  </script>
</body>
</html>
