<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>7XAQ – Mol* Viewer</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
    }
    #viewer {
      width: 100vw;
      height: 100vh;
    }
  </style>

  <!-- Mol* Viewer -->
  <script src="https://unpkg.com/molstar/build/viewer/molstar.js"></script>
</head>

<body>
  <div id="viewer"></div>

  <script>
    const viewer = new molstar.Viewer('viewer', {
      layoutIsExpanded: false,
      layoutShowControls: false,
      layoutShowRemoteState: false,
      layoutShowSequence: false,
      layoutShowLog: false,
      layoutShowLeftPanel: false,
      viewportShowExpand: false,
      viewportShowSelectionMode: false,
      viewportShowAnimation: false,
      showControls: false,
      showSettings: false
    });

    async function loadPDB() {
      // 1. Descargar el archivo PDB como texto
      const response = await fetch('structures/7xaqmAF.pdb');
      const pdbText = await response.text();

      // 2. Cargarlo en Mol*
      await viewer.loadStructureFromData(pdbText, 'pdb', {
        representationParams: {
          type: 'cartoon',
          theme: {
            globalColor: { name: 'uniform', params: { value: 0x33AAFF } }
          }
        }
      });
    }

    loadPDB();
  </script>
</body>
</html>
