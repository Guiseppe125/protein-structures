<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protein Structures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/molstar/build/viewer/molstar.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/molstar/build/viewer/molstar.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --sidebar-bg: #f8f8f6;
      --border: #e8e8e4;
      --text-primary: #1a1a1a;
      --text-secondary: #888880;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-mono);
    }

    #sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 28px 20px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .sidebar-header p {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    .sidebar-info {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .info-block {
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .info-block .label {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .info-block .value {
      font-size: 11px;
      color: var(--text-primary);
      line-height: 1.6;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }

    .sidebar-footer p {
      font-size: 9px;
      color: var(--text-secondary);
      line-height: 1.8;
      letter-spacing: 0.02em;
    }

    #viewer-wrapper {
      flex: 1;
      position: relative;
      background: #ffffff;
    }

    #viewer {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
    }

    #loading {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 1;
      transition: opacity 0.3s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--text-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 14px;
      letter-spacing: 0.06em;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="sidebar">
    <div class="sidebar-header">
      <h1>Docking Result</h1>
      <p>Interactive 3D viewer</p>
    </div>

    <div class="sidebar-info">
      <div class="info-block">
        <div class="label">Loaded structures</div>
        <div class="value">
          <span class="dot" style="background:#4a90d9"></span>7XAQ receptor<br>
          <span class="dot" style="background:#e8a838"></span>Docked ligand
        </div>
      </div>

      <div class="info-block">
        <div class="label">Ligand</div>
        <div class="value">238_mmff94s<br>Energy: −132.35</div>
      </div>

      <div class="info-block">
        <div class="label">Source</div>
        <div class="value">PyMOL export<br>Docking / concursos</div>
      </div>
    </div>

    <div class="sidebar-footer">
      <p>
        Drag → rotate<br>
        Scroll → zoom<br>
        Right-click → pan
      </p>
    </div>
  </div>

  <div id="viewer-wrapper">
    <div id="viewer"></div>
    <div id="loading">
      <div class="spinner"></div>
      <p class="loading-text">Loading structures…</p>
    </div>
  </div>

  <script>
    const loading = document.getElementById('loading');

    molstar.Viewer.create('viewer', {
      layoutIsExpanded: false,
      layoutShowControls: false,
      layoutShowRemoteState: false,
      layoutShowSequence: false,
      layoutShowLog: false,
      layoutShowLeftPanel: false,
      viewportShowExpand: true,
      viewportShowSelectionMode: false,
      canvas3d: {
        renderer: {
          backgroundColor: 0xffffff
        }
      }
    }).then(async viewer => {

      // Load receptor
      await viewer.loadStructureFromUrl(
        'structures/7xaqmAF.pdb',
        'pdb'
      );

      // Load ligand — adds to the same scene, no clear() in between
      await viewer.loadStructureFromUrl(
        'structures/238_mmff94s_e_132.35_out.pdb',
        'pdb'
      );

      // Hide loading overlay
      loading.classList.add('hidden');

    }).catch(e => {
      console.error('Failed to load structures:', e);
      loading.classList.add('hidden');
    });
  </script>

</body>
</html>
