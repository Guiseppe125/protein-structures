<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5ZQK – Protein Viewer</title>

  <!-- Mol* Viewer -->
  <script src="https://cdn.jsdelivr.net/npm/molstar/build/viewer/molstar.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/molstar/build/viewer/molstar.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: #ffffff;
    }

    #viewer-wrapper {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: #ffffff;
    }

    #viewer {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
    }

    #loading {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 1;
      transition: opacity 0.3s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #e8e8e4;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      font-size: 11px;
      color: #888880;
      margin-top: 14px;
      letter-spacing: 0.06em;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="viewer-wrapper">
    <div id="viewer"></div>
    <div id="loading">
      <div class="spinner"></div>
      <p class="loading-text">Loading 7XAQ…</p>
    </div>
  </div>

  <script>
    const loading = document.getElementById('loading');

    molstar.Viewer.create('viewer', {
      layoutIsExpanded: false,
      layoutShowControls: false,
      layoutShowRemoteState: false,
      layoutShowSequence: false,
      layoutShowLog: false,
      layoutShowLeftPanel: false,
      viewportShowExpand: true,
      viewportShowSelectionMode: false,
      canvas3d: {
        renderer: {
          backgroundColor: 0xffffff
        }
      }
    }).then(async viewer => {

      // SOLO la proteína 7XAQ
      await viewer.loadStructureFromUrl(
        'structures/5ZQK.pdb',
        'pdb'
      );

      loading.classList.add('hidden');

    }).catch(e => {
      console.error('Failed to load structure:', e);
      loading.classList.add('hidden');
    });
  </script>

</body>
</html>
